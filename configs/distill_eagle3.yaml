# Architecture 5 (EAGLE-3): feature-conditioned multimodal drafter
# Input at position t: FeatureFusion(projected_h_{t-1}, embed(x_t))
# Training loss: alpha * KL + beta * MSE_feat + (1-alpha-beta) * CE

target_model: Qwen/Qwen2-VL-2B-Instruct
arch: eagle3

arch_kwargs:
  feature_dim: 512       # projected feature dim; must equal drafter hidden_size
  adapter_dropout: 0.0

data_config: configs/data_sources.jsonl
max_seq_len: 2048

training:
  learning_rate: 2.0e-4
  weight_decay: 0.01
  num_train_epochs: 3
  warmup_ratio: 0.03
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  bf16: true
  fp16: false
  output_dir: checkpoints/eagle3
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  temperature: 2.0
  alpha: 0.7        # weight for token-distillation KL term
  beta: 0.2         # weight for feature-alignment MSE term
  loss_type: forward_kl
  top_k: 50
  use_wandb: false
  wandb_project: multimodal-speculative-decoding
  dataloader_num_workers: 4
