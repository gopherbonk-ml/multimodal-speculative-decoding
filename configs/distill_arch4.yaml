# Architecture 4: LLM(Drafter) only — text-only drafter (lower bound baseline)

target_model: Qwen/Qwen2-VL-2B-Instruct
arch: arch4

arch_kwargs: {}

data_config: configs/data_sources.jsonl
max_seq_len: 2048

training:
  learning_rate: 2.0e-4
  weight_decay: 0.01
  num_train_epochs: 3
  warmup_ratio: 0.03
  per_device_train_batch_size: 8    # larger batch: no vision processing overhead
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  bf16: true
  output_dir: checkpoints/arch4
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  temperature: 2.0
  alpha: 0.9
  loss_type: forward_kl
  use_wandb: false
